<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — Combine.fm Archive</title>
  <meta name="description" content="The page you're looking for could not be found in the Combine.fm archive." />
  <link rel="icon" href="/assets/images/favicon.png" />
  <style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f8f8;
    color: #445470;
  }
  a { color: #FE4365; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .site-header {
    background: #FE4365;
    border-bottom: 3px solid #e5365a;
    padding: 14px 0;
  }
  .site-header a {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: var(--page-width, 640px);
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
    box-sizing: border-box;
  }
  .site-header img { height: 36px; }

  .notice {
    background: #fff3cd;
    border-left: 4px solid #FE4365;
    padding: 12px 20px;
    font-size: 0.92rem;
    color: #555;
    max-width: var(--page-width, 640px);
    width: 100%;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .shutdown-box {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    padding: 40px 36px;
    max-width: 640px;
    margin: 48px auto;
  }
  .shutdown-box h1 { color: #FE4365; font-size: 2rem; margin: 0 0 16px; }
  .shutdown-box p { line-height: 1.7; margin: 0 0 14px; }
  .shutdown-box p:last-child { margin: 0; }
</style>
</head>
<body style="--page-width: 640px">
  <header class="site-header">
    <a href="/">
      <img src="/assets/images/logo-full-300.png" alt="Combine.fm" />
    </a>
  </header>
  <div class="notice">
    Combine.fm has shut down. These pages are a read-only archive of previously matched links.
  </div>
  <div class="shutdown-box">
    <h1>Page not found</h1>
    <p>
      This link doesn't exist in the Combine.fm archive.
      The original service has shut down, and only previously matched items were preserved.
    </p>
    <p>
      <a href="/">Return to the archive homepage</a>
    </p>
  </div>
</body>
</html>
